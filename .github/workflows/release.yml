name: Release desktop app

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag; must match the app version, for example v0.1.0
        required: true
        type: string
      platform:
        description: Platform to build
        required: true
        default: all
        type: choice
        options:
          - all
          - macos-arm64
          - macos-intel
          - windows
      draft:
        description: Create the GitHub Release as a draft
        required: true
        default: true
        type: boolean
      prerelease:
        description: Mark the GitHub Release as a prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag }}-${{ inputs.platform }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare-release:
    name: Prepare GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release_name: ${{ steps.release-meta.outputs.release_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate version and prepare metadata
        id: release-meta
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          node <<'NODE'
          const fs = require('node:fs')

          const tag = process.env.RELEASE_TAG
          const version = tag.startsWith('v') ? tag.slice(1) : tag
          const tauriConfig = JSON.parse(
            fs.readFileSync('frontend/src-tauri/tauri.conf.json', 'utf8'),
          )
          const cargoManifest = fs.readFileSync(
            'frontend/src-tauri/Cargo.toml',
            'utf8',
          )
          const cargoVersion = cargoManifest.match(
            /\[package\][\s\S]*?\nversion\s*=\s*"([^"]+)"/,
          )?.[1]

          if (!/^\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$/.test(version)) {
            throw new Error(`Invalid release tag: ${tag}`)
          }
          if (tauriConfig.version !== version || cargoVersion !== version) {
            throw new Error(
              `Tag ${tag} does not match tauri.conf.json (${tauriConfig.version}) ` +
                `and Cargo.toml (${cargoVersion ?? 'missing'})`,
            )
          }

          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `release_name=warming ${tag}\n`,
          )
          NODE

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_NAME: ${{ steps.release-meta.outputs.release_name }}
          RELEASE_DRAFT: ${{ inputs.draft }}
          RELEASE_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; build artifacts will be added to it."
            exit 0
          fi

          args=(
            "$RELEASE_TAG"
            --repo "$GITHUB_REPOSITORY"
            --target "$GITHUB_SHA"
            --title "$RELEASE_NAME"
            --generate-notes
          )

          if [[ "$RELEASE_DRAFT" == "true" ]]; then
            args+=(--draft)
          fi
          if [[ "$RELEASE_PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"

  macos-arm64:
    name: Build macOS ARM64 DMG
    if: inputs.platform == 'all' || inputs.platform == 'macos-arm64'
    needs: prepare-release
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target
          key: macos-arm64

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Detect Apple signing credentials
        id: apple-signing
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          if [[ -n "$APPLE_CERTIFICATE" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build, sign, and upload DMG
        if: steps.apple-signing.outputs.enabled == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: frontend
          tagName: ${{ inputs.tag }}
          releaseName: ${{ needs.prepare-release.outputs.release_name }}
          releaseDraft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          args: --target aarch64-apple-darwin --bundles dmg --ci

      - name: Build and upload unsigned DMG
        if: steps.apple-signing.outputs.enabled == 'false'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          projectPath: frontend
          tagName: ${{ inputs.tag }}
          releaseName: ${{ needs.prepare-release.outputs.release_name }}
          releaseDraft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          args: --target aarch64-apple-darwin --bundles dmg --ci --no-sign

  macos-intel:
    name: Build macOS Intel DMG
    if: inputs.platform == 'all' || inputs.platform == 'macos-intel'
    needs: prepare-release
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target
          key: macos-intel

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Detect Apple signing credentials
        id: apple-signing
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          if [[ -n "$APPLE_CERTIFICATE" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build, sign, and upload DMG
        if: steps.apple-signing.outputs.enabled == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: frontend
          tagName: ${{ inputs.tag }}
          releaseName: ${{ needs.prepare-release.outputs.release_name }}
          releaseDraft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          args: --target x86_64-apple-darwin --bundles dmg --ci

      - name: Build and upload unsigned DMG
        if: steps.apple-signing.outputs.enabled == 'false'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          projectPath: frontend
          tagName: ${{ inputs.tag }}
          releaseName: ${{ needs.prepare-release.outputs.release_name }}
          releaseDraft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          args: --target x86_64-apple-darwin --bundles dmg --ci --no-sign

  windows:
    name: Build Windows x64 NSIS
    if: inputs.platform == 'all' || inputs.platform == 'windows'
    needs: prepare-release
    runs-on: windows-2022
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target
          key: windows-x64

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build and upload NSIS installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          projectPath: frontend
          tagName: ${{ inputs.tag }}
          releaseName: ${{ needs.prepare-release.outputs.release_name }}
          releaseDraft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          args: --target x86_64-pc-windows-msvc --bundles nsis --ci
