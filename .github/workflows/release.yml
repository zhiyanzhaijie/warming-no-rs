name: Release desktop app

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag; must match the app version, for example v0.1.0
        required: true
        type: string
      platform:
        description: Platform to build
        required: true
        default: all
        type: choice
        options:
          - all
          - macos-arm64
          - macos-intel
          - windows
      prerelease:
        description: Mark the GitHub Release as a prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag }}-${{ inputs.platform }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare-release:
    name: Prepare GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate version and prepare metadata
        id: release-meta
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          node <<'NODE'
          const fs = require('node:fs')

          const tag = process.env.RELEASE_TAG
          const version = tag.startsWith('v') ? tag.slice(1) : tag
          const tauriConfig = JSON.parse(
            fs.readFileSync('frontend/src-tauri/tauri.conf.json', 'utf8'),
          )
          const cargoManifest = fs.readFileSync(
            'frontend/src-tauri/Cargo.toml',
            'utf8',
          )
          const cargoVersion = cargoManifest.match(
            /\[package\][\s\S]*?\nversion\s*=\s*"([^"]+)"/,
          )?.[1]

          if (!/^\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$/.test(version)) {
            throw new Error(`Invalid release tag: ${tag}`)
          }
          if (tauriConfig.version !== version || cargoVersion !== version) {
            throw new Error(
              `Tag ${tag} does not match tauri.conf.json (${tauriConfig.version}) ` +
                `and Cargo.toml (${cargoVersion ?? 'missing'})`,
            )
          }

          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `release_name=warming ${tag}\n`,
          )
          NODE

      - name: Create or publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_NAME: ${{ steps.release-meta.outputs.release_name }}
          RELEASE_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_NAME" \
              --draft=false \
              --prerelease="$RELEASE_PRERELEASE"
            echo "Release $RELEASE_TAG is published and ready for artifacts."
            exit 0
          fi

          args=(
            "$RELEASE_TAG"
            --repo "$GITHUB_REPOSITORY"
            --target "$GITHUB_SHA"
            --title "$RELEASE_NAME"
            --generate-notes
          )

          if [[ "$RELEASE_PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"

  macos-arm64:
    name: Build macOS ARM64 DMG
    if: inputs.platform == 'all' || inputs.platform == 'macos-arm64'
    needs: prepare-release
    runs-on: macos-14-arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: 0.11.28
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target
          key: macos-arm64

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Detect Apple signing credentials
        id: apple-signing
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          if [[ -n "$APPLE_CERTIFICATE" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and sign DMG
        if: steps.apple-signing.outputs.enabled == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: frontend
          args: --target aarch64-apple-darwin --bundles dmg --ci

      - name: Build unsigned DMG
        if: steps.apple-signing.outputs.enabled == 'false'
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: frontend
          args: --target aarch64-apple-darwin --bundles dmg --ci --no-sign

      - name: Upload DMG to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          shopt -s nullglob
          artifacts=(
            frontend/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          )
          if [[ ${#artifacts[@]} -ne 1 ]]; then
            echo "::error::Expected exactly one ARM64 DMG, found ${#artifacts[@]}."
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "${artifacts[0]}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

  macos-intel:
    name: Build macOS Intel DMG
    if: inputs.platform == 'all' || inputs.platform == 'macos-intel'
    needs: prepare-release
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: 0.11.28
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target
          key: macos-intel

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Detect Apple signing credentials
        id: apple-signing
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          if [[ -n "$APPLE_CERTIFICATE" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and sign DMG
        if: steps.apple-signing.outputs.enabled == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: frontend
          args: --target x86_64-apple-darwin --bundles dmg --ci

      - name: Build unsigned DMG
        if: steps.apple-signing.outputs.enabled == 'false'
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: frontend
          args: --target x86_64-apple-darwin --bundles dmg --ci --no-sign

      - name: Upload DMG to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          shopt -s nullglob
          artifacts=(
            frontend/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          )
          if [[ ${#artifacts[@]} -ne 1 ]]; then
            echo "::error::Expected exactly one Intel DMG, found ${#artifacts[@]}."
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "${artifacts[0]}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

  windows:
    name: Build Windows x64 NSIS
    if: inputs.platform == 'all' || inputs.platform == 'windows'
    needs: prepare-release
    runs-on: windows-2022
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: 0.11.28
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target
          key: windows-x64

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build NSIS installer
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: frontend
          args: --target x86_64-pc-windows-msvc --bundles nsis --ci

      - name: Upload NSIS installer to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          $artifacts = @(
            Get-ChildItem `
              -Path "frontend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis" `
              -Filter "*.exe" `
              -File
          )
          if ($artifacts.Count -ne 1) {
            Write-Error "Expected exactly one NSIS installer, found $($artifacts.Count)."
            exit 1
          }
          $installer = $artifacts[0].FullName
          gh release upload $env:RELEASE_TAG $installer `
            --repo $env:GITHUB_REPOSITORY `
            --clobber
